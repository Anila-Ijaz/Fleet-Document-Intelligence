# Local development stack. One command: `docker compose up --build`.
#
# Services:
#   db         - Postgres 16 with pgvector
#   extraction - the FastAPI extraction service (OpenAI-backed)
#
# Set your OpenAI key first:  cp .env.example .env  (then edit OPENAI_API_KEY)
# Then open http://localhost:8000/docs

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet"]
      interval: 5s
      timeout: 3s
      retries: 10

  extraction:
    build: ./services/extraction
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://fleet:fleet@db:5432/fleet
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in your .env file}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIM: "1536"
    depends_on:
      db:
        condition: service_healthy

  rag:
    build: ./services/rag
    ports:
      - "8001:8000"
    environment:
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://fleet:fleet@db:5432/fleet
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in your .env file}
      EMBEDDING_PROVIDER: openai
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIM: "1536"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - extraction
      - rag

volumes:
  pgdata:

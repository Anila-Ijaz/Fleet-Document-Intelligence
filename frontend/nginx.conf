server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend services on Render.
    # Timeouts are generous to handle free-tier cold starts (up to 60s).
    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;

    location /api/extract/ {
        proxy_pass https://fleet-document-intelligence.onrender.com/;
        proxy_set_header Host fleet-document-intelligence.onrender.com;
        proxy_ssl_server_name on;
    }
    location /api/rag/ {
        proxy_pass https://rag-chatbot-cs9e.onrender.com/;
        proxy_set_header Host rag-chatbot-cs9e.onrender.com;
        proxy_ssl_server_name on;
    }
    location /api/agent/ {
        proxy_pass https://agent-service-4jxu.onrender.com/;
        proxy_set_header Host agent-service-4jxu.onrender.com;
        proxy_ssl_server_name on;
    }
}

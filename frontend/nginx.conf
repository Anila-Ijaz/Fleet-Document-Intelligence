server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend services (names resolve via docker/k8s DNS).
    location /api/extract/ {
        proxy_pass http://extraction:8000/;
        proxy_set_header Host $host;
    }
    location /api/rag/ {
        proxy_pass http://rag:8000/;
        proxy_set_header Host $host;
    }
    location /api/agent/ {
        proxy_pass http://agent:8000/;
        proxy_set_header Host $host;
    }
}

# Frontend (nginx) + Ingress that routes everything through one entrypoint.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: fleet/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fleet
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Ingress: the frontend's nginx already proxies /api/* to the backends, so the
# ingress only needs to route everything to the frontend service. On EKS this is
# fronted by an AWS Load Balancer via the AWS Load Balancer Controller.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-ingress
  namespace: fleet
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

# The three Python microservices. Each: Deployment + ClusterIP Service.
# Images are referenced by a placeholder repo; the deploy script rewrites them to
# either locally-loaded kind images or your ECR registry for EKS.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extraction
  namespace: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extraction
  template:
    metadata:
      labels:
        app: extraction
    spec:
      containers:
        - name: extraction
          image: fleet/extraction:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fleet-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fleet-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: extraction
  namespace: fleet
spec:
  selector:
    app: extraction
  ports:
    - port: 8000
      targetPort: 8000

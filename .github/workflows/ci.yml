name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [extraction, rag, agent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    strategy:
      matrix:
        service: [extraction, rag, agent, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            docker build -t fleet/frontend:ci ./frontend
          else
            docker build -t fleet/${{ matrix.service }}:ci ./services/${{ matrix.service }}
          fi
